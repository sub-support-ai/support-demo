services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      AI_SERVICE_URL: http://host.docker.internal:8001
    depends_on:
      db:
        condition: service_healthy
      # ai-service РїРѕРґРєР»СЋС‡Р°РµС‚СЃСЏ С‚РѕР№ Р¶Рµ СЃРµС‚СЊСЋ, РёРјСЏ СЃРµСЂРІРёСЃР° = DNS-РёРјСЏ РґР»СЏ
      # РєРѕРЅС‚РµР№РЅРµСЂРѕРІ. Backend РґРѕСЃС‚СѓС‡РёС‚СЃСЏ РЅР° http://ai-service:8001 (СЃРј. .env).
      # РџРѕРєР° AI-С‡Р°СЃС‚СЊ СЂР°Р·СЂР°Р±Р°С‚С‹РІР°РµС‚СЃСЏ, Р·Р°РІРёСЃРёРјРѕСЃС‚СЊ РќР• РѕР±СЏР·Р°С‚РµР»СЊРЅР°СЏ:
      # РµСЃР»Рё AI Service РЅРµ РїРѕРґРЅСЏС‚, classify/answer РѕС‚РІРµС‡Р°СЋС‚ fallback'РѕРј
      # (confidence=0.0 в†’ С‚РёРєРµС‚ СѓС…РѕРґРёС‚ Рє Р¶РёРІРѕРјСѓ Р°РіРµРЅС‚Сѓ, СЃРј. ai_classifier.py).
    volumes:
      - .:/app
    # РЎРЅР°С‡Р°Р»Р° РїСЂРѕРіРѕРЅСЏРµРј РјРёРіСЂР°С†РёРё Р‘Р” (alembic upgrade head), РїРѕС‚РѕРј Р·Р°РїСѓСЃРєР°РµРј uvicorn.
    # РўР°Рє РЅР° РєР°Р¶РґРѕРј СЃС‚Р°СЂС‚Рµ РєРѕРЅС‚РµР№РЅРµСЂР° СЃС…РµРјР° Р°РІС‚РѕРјР°С‚РёС‡РµСЃРєРё СЃРёРЅС…СЂРѕРЅРёР·РёСЂСѓРµС‚СЃСЏ СЃ РєРѕРґРѕРј.
    # РРґРµРјРїРѕС‚РµРЅС‚РЅРѕ: РµСЃР»Рё РјРёРіСЂР°С†РёР№ РЅРµС‚ вЂ” alembic РЅРёС‡РµРіРѕ РЅРµ РґРµР»Р°РµС‚.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  ai-worker:
    build: .
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      AI_SERVICE_URL: http://host.docker.internal:8001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: python -m app.workers.ai_worker

  # в”Ђв”Ђ ai-service в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Р›РѕРєР°Р»СЊРЅС‹Р№ AI-СЃРµСЂРІРёСЃ СЃ Mistral (С‡РµСЂРµР· Ollama / llama.cpp). РџРѕ С‚СЂРµР±РѕРІР°РЅРёСЋ
  # Р·Р°РєР°Р·С‡РёРєР° (РЎРР‘РРќРўР•Рљ-РЎРћР¤Рў / Р РѕСЃРЅРµС„С‚СЊ) РґР°РЅРЅС‹Рµ РЅРµ РїРѕРєРёРґР°СЋС‚ РїРµСЂРёРјРµС‚СЂ вЂ”
  # РїРѕСЌС‚РѕРјСѓ СЃРµСЂРІРёСЃ РєСЂСѓС‚РёС‚СЃСЏ РІ СЃРѕСЃРµРґРЅРµРј РєРѕРЅС‚РµР№РЅРµСЂРµ, Р° РЅРµ РІ РѕР±Р»Р°РєРµ.
  #
  # Р­С‚РѕС‚ Р±Р»РѕРє РЅР°РјРµСЂРµРЅРЅРѕ Р·Р°РєРѕРјРјРµРЅС‚РёСЂРѕРІР°РЅ: РѕР±СЂР°Р· Рё runtime-РЅР°СЃС‚СЂРѕР№РєРё СЃРѕР±РёСЂР°РµС‚
  # AI-РєРѕРјР°РЅРґР° (РѕС‚РґРµР»СЊРЅС‹Р№ СЂРµРїРѕР·РёС‚РѕСЂРёР№). Backend РѕР±С‰Р°РµС‚СЃСЏ СЃ СЃРµСЂРІРёСЃРѕРј С‚РѕР»СЊРєРѕ
  # С‡РµСЂРµР· HTTP-РєРѕРЅС‚СЂР°РєС‚:
  #   POST /ai/classify   { ticket_id, title, body } в†’ { category, priority, confidence, draft_response }
  #   POST /ai/answer     { conversation_id, message }    в†’ { answer, confidence, should_escalate }
  #
  # РљРѕРіРґР° AI lead РѕРїСѓР±Р»РёРєСѓРµС‚ РѕР±СЂР°Р·, СЂР°СЃРєРѕРјРјРµРЅС‚РёСЂСѓРµРј Рё РїРѕСЃС‚Р°РІРёРј РєРѕРЅРєСЂРµС‚РЅС‹Р№
  # image tag. Р—Р°РІРёСЃРёРјРѕСЃС‚СЊ РѕС‚ GPU вЂ” С‚РѕР¶Рµ РµРіРѕ СЂРµС€РµРЅРёРµ (CPU РґР»СЏ dev, GPU РІ prod).
  #
  # ai-service:
  #   image: <registry>/<ai-service>:<tag>
  #   ports:
  #     - "8001:8001"
  #   # volumes: РјРѕРЅС‚РёСЂСѓРµРј РјРѕРґРµР»СЊ, С‡С‚РѕР±С‹ РЅРµ СЃРєР°С‡РёРІР°С‚СЊ РµС‘ РЅР° РєР°Р¶РґРѕРј СЃС‚Р°СЂС‚Рµ РєРѕРЅС‚РµР№РЅРµСЂР°
  #   # - ./models:/models
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8001/healthcheck"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 60s   # Mistral РїСЂРѕРіСЂРµРІР°РµС‚СЃСЏ РґРѕР»СЊС€Рµ, С‡РµРј РѕР±С‹С‡РЅС‹Р№ HTTP-СЃРµСЂРІРёСЃ

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
