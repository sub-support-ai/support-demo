name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    # Матрица версий Python: 3.12 — то, на чём собирается прод-образ
    # (см. Dockerfile), 3.13 — проверка совместимости с текущей stable-версией,
    # чтобы апгрейд Dockerfile не стал внезапным сюрпризом.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Проверяем, что миграции Alembic применяются к пустому Postgres без ошибок.
      # Это страховка: если кто-то изменит модель, но забудет сгенерировать
      # миграцию — CI упадёт на этом шаге, а не в проде у клиента.
      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
        run: |
          python -m alembic upgrade head

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
        run: |
          python -m pytest -q

  ai-service-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install AI service dependencies
        working-directory: ai/ai-service
        run: |
          pip install -r requirements.txt
          pip install pytest

      # Тесты не требуют запущенного Ollama: requests замокирован на уровне
      # модуля, сетевых вызовов нет. Быстро (~2 с) и детерминированно.
      - name: Run AI service tests
        working-directory: ai/ai-service
        run: python -m pytest tests/ -q
