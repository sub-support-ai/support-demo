# Базовый эвал-набор для RAG-retrieval'а.
#
# Каждый кейс = реалистичный запрос пользователя + список title'ов статей
# из KB, которые должны попасть в top-1 ответе. Один и тот же запрос может
# матчиться нескольким статьям (несколько правильных ответов).
#
# Дополняется по мере того, как админы / саппорт находят промахи в проде.
# Любая правка retrieval-логики (chunking, merge-веса, новые поля в скоре)
# должна не ронять метрики на этом наборе — см. tests/test_rag_evaluation.py.
#
# Поле `notes` опциональное; используется чтобы не забыть откуда взялся кейс
# («регрессия после тикета #427», «ошибка из demo-сценария 2025-04»).

cases:
  # ── IT / доступы ────────────────────────────────────────────────────────
  - query: "не работает VPN, не подключается"
    expected_titles:
      - "VPN не подключается"
    notes: "Прямой keyword-match — sanity-check"

  - query: "впн отвалился, как починить"
    expected_titles:
      - "VPN не подключается"
    notes: "Сленг 'впн' вместо VPN, проверка на keyword'ы"

  - query: "забыл пароль от учётки, не могу зайти"
    expected_titles:
      - "Сброс пароля"

  - query: "пароль не подходит при входе в почту"
    expected_titles:
      - "Сброс пароля"
    notes: "Контекст 'почта' не должен сбивать с правильной статьи о паролях"

  # ── IT / hardware ───────────────────────────────────────────────────────
  - query: "принтер не печатает, очередь висит"
    expected_titles:
      - "Принтер не печатает"

  - query: "ноутбук не включается"
    expected_titles:
      - "Ноутбук не включается"

  - query: "сломался монитор, нужно заменить"
    expected_titles:
      - "Замена оборудования"
    notes: "Запрос-инцидент, ожидаем эскалационный ран­бук"

  # ── IT / network ────────────────────────────────────────────────────────
  - query: "пропал интернет, ничего не открывается"
    expected_titles:
      - "Нет интернета на рабочем месте"

  - query: "wi-fi есть, но страницы не грузятся"
    expected_titles:
      - "Нет интернета на рабочем месте"
    notes: "Тонкость: симптомы 'есть подключение, нет интернета' — частый промах FTS"

  # ── HR ──────────────────────────────────────────────────────────────────
  - query: "как оформить отпуск"
    expected_titles:
      - "Оформление отпуска"

  - query: "хочу взять больничный"
    expected_titles:
      - "Оформление больничного"

  - query: "когда зарплата за этот месяц"
    expected_titles:
      - "Расчёт и выплата зарплаты"

  # ── Finance ─────────────────────────────────────────────────────────────
  - query: "не пришёл акт по счёту от поставщика"
    expected_titles:
      - "Закрывающие документы по счетам"

  - query: "как сделать авансовый отчёт по командировке"
    expected_titles:
      - "Авансовый отчёт"

  # ── Edge cases ──────────────────────────────────────────────────────────
  - query: "1С тормозит у всего отдела"
    expected_titles:
      - "Проблемы с 1С"
    notes: "Mass-incident keywords — статьёй должна закрываться, а не уйти в escalate"
