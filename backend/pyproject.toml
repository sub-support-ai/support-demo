[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes (неиспользуемые импорты, неопределённые имена)
    "I",   # isort (порядок импортов)
    "UP",  # pyupgrade (современный синтаксис Python 3.12)
    "B",   # flake8-bugbear (частые баги)
    "C4",  # flake8-comprehensions (лишние list()/dict() вызовы)
    "SIM", # flake8-simplify (упрощение if/else, context managers)
]
ignore = [
    "E501",  # длина строки — контролируется ruff format, не lint
    "B008",  # вызов функции в default-аргументе (FastAPI Depends-паттерн)
    "SIM117", # вложенные with — не всегда можно упростить с asynccontextmanager
]

[tool.ruff.lint.per-file-ignores]
"app/models/*.py" = ["F821"]
"tests/conftest.py" = ["E402"]
"evals/metrics.py" = ["UP047"]
"tests/*" = ["S101"]  # assert допустим в тестах

[tool.ruff.format]
quote-style = "double"
indent-style = "space"


[tool.mypy]
python_version = "3.12"
# Не strict (много существующего кода без аннотаций), но самые ценные проверки:
disallow_untyped_defs = true      # все функции должны иметь аннотации
check_untyped_defs = true         # проверять тело функций без аннотаций
warn_return_any = true            # предупреждение при возврате Any
warn_unused_ignores = true        # убирать лишние # type: ignore
no_implicit_optional = true       # X = None не делает тип Optional[X] автоматически
ignore_missing_imports = true     # не ломаться на библиотеках без стабов

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false     # в тестах аннотации опциональны

# Существующий код без аннотаций — постепенно добавляем по мере рефакторинга.
# Новый код (app.routers.automation_rules, app.services.automation) уже
# полностью аннотирован и проходит mypy без overrides.
[[tool.mypy.overrides]]
module = [
    "app.dependencies",
    "app.rate_limit",
    "app.security",
    "app.pg_notify",
    "app.models.ticket",
    "app.models.user",
    "app.models.ai_log",
    "app.models.ai_job",
    "app.models.message",
    "app.models.response",
    "app.models.ticket_comment",
    "app.models.ticket_rating",
    "app.models.knowledge_embedding_job",
    "app.routers.auth",
    "app.routers.conversations",
    "app.routers.jobs",
    "app.routers.knowledge_articles",
    "app.routers.notifications",
    "app.routers.response_templates",
    "app.routers.stats",
    "app.routers.tickets",
    "app.routers.users",
    "app.services.ai_classifier",
    "app.services.conversation_ai",
    "app.services.kb_promotion",
    "app.services.knowledge_base",
    "app.services.knowledge_embedding_jobs",
    "app.services.knowledge_embeddings",
    "app.services.sla",
]
disallow_untyped_defs = false
warn_return_any = false

# Файлы с унаследованными ошибками типов, которые мы не трогаем в рамках
# текущего рефакторинга (накоплены до внедрения mypy в CI).
# app.main: name-shadowing `app = FastAPI(...)` vs `app` package даёт
# ложные attr-defined; остальные файлы имеют прочие pre-existing ошибки.
[[tool.mypy.overrides]]
module = [
    "app.main",
    "app.dependencies",
    "app.pg_notify",
    "app.models.ticket",
    "app.models.user",
    "app.models.ai_log",
    "app.models.ai_job",
    "app.models.message",
    "app.models.response",
    "app.models.ticket_comment",
    "app.models.ticket_rating",
    "app.models.knowledge_embedding_job",
    "app.routers.auth",
    "app.routers.jobs",
    "app.routers.knowledge_articles",
    "app.routers.tickets",
    "app.services.ai_classifier",
    "app.services.conversation_ai",
    "app.services.knowledge_base",
    "app.services.knowledge_embedding_jobs",
    "app.services.sla",
]
ignore_errors = true
