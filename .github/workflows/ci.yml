name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Backend: lint → typecheck → migrations → tests ────────────────────────
  lint-and-test:
    runs-on: ubuntu-latest

    # 3.12 — прод-образ (Dockerfile FROM python:3.12-slim).
    # 3.13 — проверка совместимости заранее, чтобы апгрейд не был сюрпризом.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # ruff check: ошибки линтера (неиспользуемые импорты, баги, isort).
      # ruff format --check: форматирование (не меняет файлы, только проверяет).
      - name: Ruff lint & format check
        working-directory: backend
        run: |
          ruff check .
          ruff format --check .

      # mypy только на 3.12 (прод-версии): нет смысла гонять дважды,
      # поведение стабов между 3.12 и 3.13 идентично для нашего кода.
      - name: Mypy type check
        if: matrix.python-version == '3.12'
        working-directory: backend
        run: mypy app/

      # Страховка: если кто-то изменил модель, но забыл сгенерировать
      # миграцию — CI упадёт здесь, а не в проде у клиента.
      - name: Run Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
        run: |
          python -m alembic upgrade head

      - name: Run tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
        run: |
          python -m pytest -q

  # ── AI service: mock-based tests, без Ollama ──────────────────────────────
  ai-service-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai/ai-service/requirements.txt

      - name: Install AI service dependencies
        working-directory: ai/ai-service
        run: |
          pip install -r requirements.txt
          pip install pytest

      # requests замокирован на уровне модуля — Ollama не нужен.
      - name: Run AI service tests
        working-directory: ai/ai-service
        run: python -m pytest tests/ -q

  # ── Frontend: TypeScript typecheck + Vitest unit tests ────────────────────
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # tsc --noEmit: TypeScript проверяет типы без генерации .js файлов.
      # Ловит: несоответствие типов, отсутствующие свойства, импорты.
      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      # vitest run: все *.test.ts / *.test.tsx файлы в src/.
      - name: Run frontend tests
        working-directory: frontend
        run: npm test
