version: 1
priorities:
  - критический
  - высокий
  - средний
  - низкий

departments:
  IT:
    - id: it_hardware
      title: Оборудование
      description: Не работает или сломано физическое оборудование выданное сотруднику или находящееся в офисе.
      examples:
        - Не включается ноутбук, не работает экран, шумит вентилятор.
        - Не печатает корпоративный принтер, замятие бумаги.
        - Не работает гарнитура / web-камера / монитор.
    - id: it_software_install
      title: Установка и переустановка ПО
      description: Установка нового ПО, переустановка после поломки или сбоя профиля, обновление до конкретной версии. Сюда же — настройка корпоративного ПО на новом устройстве. Признак — приложение ещё не работает у пользователя, его нужно поставить или починить через переустановку.
      examples:
        - Нужна установка Photoshop / Visual Studio / специализированного ПО.
        - Переустановить 1С после повреждения профиля.
        - Установить корпоративный VPN-клиент на новый ноутбук.
        - Настройка корпоративного ПО на удалённом ноутбуке нового сотрудника.
        - Обновить Outlook до актуальной версии после миграции.
    - id: it_software_error
      title: Ошибки в работе внутренних приложений
      description: Установленное ПО запускается, но работает с ошибками — падает, виснет, выдаёт ошибку, не выполняет конкретный функционал. В отличие от install — приложение уже стоит у пользователя, проблема в работе.
      examples:
        - 1С падает при формировании конкретного отчёта.
        - Outlook не отправляет письма, висит исходящая очередь.
        - Jira не сохраняет изменения в задаче.
        - Корпоративный портал выдаёт 500 при скачивании документа.
        - BI-дашборд показывает нулевые значения для известных данных.
    - id: it_access_grant
      title: Выдача доступов
      description: Запрос новых прав или доступов к системам, папкам, репозиториям, ресурсам. Оформление при найме, переводе, подключении к проекту, расширении полномочий.
      examples:
        - Нужен доступ к новому репозиторию gitlab для проекта.
        - Доступ к shared-папке отдела для нового сотрудника.
        - Права на чтение в CRM для аналитика отдела маркетинга.
        - Доступ к VPN после смены подразделения.
        - Подключение нового сотрудника ко всем системам отдела.
    - id: it_access_reset
      title: Сброс пароля и разблокировка
      description: Сброс пароля, разблокировка учётной записи, восстановление 2FA, проблемы со входом из-за просроченных, утерянных или забытых credentials. Учётка существует и доступы выданы — пользователь не может ими воспользоваться.
      examples:
        - Забыл пароль от доменной учётной записи.
        - Заблокирован аккаунт после нескольких неудачных попыток входа.
        - Слетел токен 2FA после смены телефона.
        - СМС с кодом 2FA не приходят.
        - Пароль истёк, не успел сменить, заблокирован вход в системы.
    - id: it_network
      title: Сеть и связь
      description: Проблемы с интернетом, VPN, корпоративной почтой как сервисом, телефонией.
      examples:
        - VPN не подключается из дома, ошибка handshake.
        - Не приходят письма, Exchange выдаёт timeout.
        - Низкая скорость интернета в офисе на конкретном этаже.

  HR:
    - id: hr_payroll
      title: Зарплата и расчёты
      description: Вопросы по начислениям, расчётным листкам, премиям, удержаниям, налогам в зарплатном контексте.
      examples:
        - Не пришла зарплата в срок, нужна сверка.
        - Ошибка в расчётном листке, неверная сумма премии.
        - Удержание непонятного характера, требуется расшифровка.
    - id: hr_leave
      title: Отпуска и отгулы
      description: Оформление, перенос, отзыв отпуска, отгулы, больничные, командировочные дни.
      examples:
        - Перенести отпуск на другую дату, нужны документы.
        - Оформить отгул за работу в выходной.
        - Подать больничный лист задним числом, как правильно.
    - id: hr_policy
      title: Политики и документы
      description: Внутренние регламенты, кадровые справки, копии трудовой, изменения личных данных.
      examples:
        - Запрос справки 2-НДФЛ за прошлый год.
        - Изменить фамилию в кадровых документах после замужества.
        - Где почитать политику удалённой работы.
    - id: hr_onboarding
      title: Онбординг и адаптация
      description: Оформление при найме, обходной лист, наставник, увольнение, перевод между подразделениями.
      examples:
        - Первый день, не оформлен пропуск и нет учётки.
        - Обходной лист при увольнении, какие подписи нужны.
        - Перевод в другой отдел, какие шаги.

  finance:
    - id: finance_invoice
      title: Счета и оплаты
      description: Входящие и исходящие счета, оплаты контрагентам, акты выполненных работ.
      examples:
        - Не оплачен счёт поставщика третий месяц.
        - Нужна сверка по акту, контрагент прислал расхождение.
        - Как провести счёт без оригинала договора.
    - id: finance_expense
      title: Возмещение расходов
      description: Авансовые отчёты, возмещение командировочных, такси, ноутбук за свой счёт.
      examples:
        - Подать авансовый отчёт по командировке.
        - Возмещение за такси по работе, нужны ли чеки.
        - Купил оборудование за свой счёт, как вернуть деньги.
    - id: finance_report
      title: Отчётность и бюджеты
      description: Бюджетирование подразделения, управленческая отчётность, выгрузки для аудита.
      examples:
        - Нужна выгрузка расходов отдела за квартал.
        - Превышен бюджет проекта, как оформить дополнительное согласование.
        - Аудит запрашивает оборотно-сальдовую за полгода.

other:
  - id: other
    title: Прочее
    description: Запросы, не подпадающие под перечисленные категории, или неясные обращения требующие уточнения.
    examples:
      - Жалоба на коллегу.
      - Идея по улучшению процесса.
      - Запрос неясен, требуется уточнение у пользователя.

priority_calibration: |
  Приоритет определяется бизнес-влиянием, не эмоциями пользователя:
    критический — блокирует работу команды/отдела или влияет на выручку/клиентов.
                  Примеры: лежит общий VPN, не работает 1С у бухгалтерии в день закрытия,
                           массово не приходит зарплата.
    высокий     — блокирует работу одного сотрудника на ключевой задаче с дедлайном.
                  Примеры: не могу попасть в систему перед демо, потерял пароль перед сдачей отчёта.
    средний     — мешает работе но есть обходной путь или не срочно.
                  Примеры: тормозит ноутбук, неправильный расчётный лист (можно решить за неделю).
    низкий      — справочные вопросы, мелкие неудобства, можно подождать.
                  Примеры: где политика отпусков, нужна копия трудовой через месяц.

  Паникующий пользователь с низким бизнес-влиянием → всё равно "низкий".
  Спокойный пользователь, у которого лежит критичная система → "критический".
