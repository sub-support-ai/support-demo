server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: все пути без файла → index.html (React Router handle'ит на клиенте)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/ → FastAPI в той же compose-сети (имя сервиса = app).
    # proxy_read_timeout > VITE_API_TIMEOUT_MS (210 000 мс = 210 с), иначе
    # nginx обрежет ответ раньше, чем Mistral закончит генерацию.
    location /api/ {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    220s;
        proxy_send_timeout    220s;
        proxy_connect_timeout 10s;
    }

    # Статика Vite — fingerprinted хэши в именах файлов → вечный кэш безопасен.
    location ~* \.(?:js|css|woff2?|svg|png|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
